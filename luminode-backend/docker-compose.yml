services:
  luminode-backend:
    build: .
    image: luminode-backend:latest
    container_name: luminode-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    # 容器内主进程崩了就重启,3 次失败间隔指数退避
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
