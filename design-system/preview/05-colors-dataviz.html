<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Colors · Data viz</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">Categorical (6) &amp; sequential (energy ramp)</div>
  <div class="row" style="gap: 4px;">
    <div style="width:48px;height:38px;background:#14B8A6;border-radius:6px;"></div>
    <div style="width:48px;height:38px;background:#1E40AF;border-radius:6px;"></div>
    <div style="width:48px;height:38px;background:#F59E0B;border-radius:6px;"></div>
    <div style="width:48px;height:38px;background:#8B5CF6;border-radius:6px;"></div>
    <div style="width:48px;height:38px;background:#EF4444;border-radius:6px;"></div>
    <div style="width:48px;height:38px;background:#0EA5E9;border-radius:6px;"></div>
  </div>
  <div class="label">Sequential ramp · low → high load</div>
  <div class="row" style="gap: 0;">
    <div style="flex:1;height:28px;background:#ECFEFF;"></div>
    <div style="flex:1;height:28px;background:#A7F3D0;"></div>
    <div style="flex:1;height:28px;background:#5EEAD4;"></div>
    <div style="flex:1;height:28px;background:#14B8A6;"></div>
    <div style="flex:1;height:28px;background:#0F766E;"></div>
    <div style="flex:1;height:28px;background:#134E4A;"></div>
  </div>
  <div class="muted mono" style="font-size: 10px;">--data-1…6 · --ramp-0…5</div>
</div></body></html>
