<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Icons · UI</title>
<link rel="stylesheet" href="_card.css">
<style>
.ig { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px 8px; }
.ig .cell { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; border-radius: 8px; background: var(--bg-elevated); border: 1px solid var(--border); }
.ig .cell img { width: 20px; height: 20px; }
.ig .cell .nm { font-size: 9.5px; color: var(--fg-2); font-family: var(--font-mono); }
</style></head>
<body><div class="card">
  <div class="label">UI icons · functional set</div>
  <div class="ig" style="color: var(--n-700);">
    <div class="cell"><img src="../assets/icons/dashboard.svg"><span class="nm">dash</span></div>
    <div class="cell"><img src="../assets/icons/chart.svg"><span class="nm">chart</span></div>
    <div class="cell"><img src="../assets/icons/alert.svg"><span class="nm">alert</span></div>
    <div class="cell"><img src="../assets/icons/map-pin.svg"><span class="nm">pin</span></div>
    <div class="cell"><img src="../assets/icons/clock.svg"><span class="nm">clock</span></div>
    <div class="cell"><img src="../assets/icons/calendar.svg"><span class="nm">cal</span></div>
    <div class="cell"><img src="../assets/icons/user.svg"><span class="nm">user</span></div>
    <div class="cell"><img src="../assets/icons/settings.svg"><span class="nm">settings</span></div>
    <div class="cell"><img src="../assets/icons/search.svg"><span class="nm">search</span></div>
    <div class="cell"><img src="../assets/icons/filter.svg"><span class="nm">filter</span></div>
    <div class="cell"><img src="../assets/icons/edit.svg"><span class="nm">edit</span></div>
    <div class="cell"><img src="../assets/icons/external.svg"><span class="nm">ext</span></div>
    <div class="cell"><img src="../assets/icons/download.svg"><span class="nm">dl</span></div>
    <div class="cell"><img src="../assets/icons/check.svg"><span class="nm">check</span></div>
    <div class="cell"><img src="../assets/icons/close.svg"><span class="nm">close</span></div>
    <div class="cell"><img src="../assets/icons/plus.svg"><span class="nm">plus</span></div>
    <div class="cell"><img src="../assets/icons/more.svg"><span class="nm">more</span></div>
    <div class="cell"><img src="../assets/icons/arrow-right.svg"><span class="nm">arrow</span></div>
  </div>
</div></body></html>
