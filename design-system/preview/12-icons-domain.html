<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Icons · Domain</title>
<link rel="stylesheet" href="_card.css">
<style>
.ig { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px 8px; }
.ig .cell { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; border-radius: 8px; background: var(--bg-elevated); border: 1px solid var(--border); }
.ig .cell img { width: 22px; height: 22px; }
.ig .cell .nm { font-size: 9.5px; color: var(--fg-2); font-family: var(--font-mono); }
</style></head>
<body><div class="card">
  <div class="label">Domain icons · 24×24 · 1.5px stroke · currentColor</div>
  <div class="ig" style="color: var(--n-700);">
    <div class="cell"><img src="../assets/icons/streetlight.svg"><span class="nm">lamp</span></div>
    <div class="cell"><img src="../assets/icons/streetlight-on.svg"><span class="nm">lamp-on</span></div>
    <div class="cell"><img src="../assets/icons/sensor.svg"><span class="nm">sensor</span></div>
    <div class="cell"><img src="../assets/icons/temperature.svg"><span class="nm">temp</span></div>
    <div class="cell"><img src="../assets/icons/humidity.svg"><span class="nm">humid</span></div>
    <div class="cell"><img src="../assets/icons/air-quality.svg"><span class="nm">PM2.5</span></div>
    <div class="cell"><img src="../assets/icons/fan.svg"><span class="nm">fan</span></div>
    <div class="cell"><img src="../assets/icons/sprayer.svg"><span class="nm">sprayer</span></div>
    <div class="cell"><img src="../assets/icons/water-pump.svg"><span class="nm">pump</span></div>
    <div class="cell"><img src="../assets/icons/wind.svg"><span class="nm">wind</span></div>
    <div class="cell"><img src="../assets/icons/energy.svg"><span class="nm">energy</span></div>
    <div class="cell"><img src="../assets/icons/grid.svg"><span class="nm">grid</span></div>
    <div class="cell"><img src="../assets/icons/signal.svg"><span class="nm">signal</span></div>
    <div class="cell"><img src="../assets/icons/wifi.svg"><span class="nm">wifi</span></div>
  </div>
</div></body></html>
