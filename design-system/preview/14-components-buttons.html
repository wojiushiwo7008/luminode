<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Components · Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; border: 1px solid transparent; cursor: pointer; font-family: inherit; transition: all 200ms cubic-bezier(0.22, 1, 0.36, 1); }
.btn-primary { background: var(--brand-glow); color: #052E2A; }
.btn-primary:hover { background: var(--brand-glow-deep); color: #fff; }
.btn-secondary { background: var(--bg-elevated); color: var(--fg-1); border-color: var(--border-strong); }
.btn-secondary:hover { background: var(--bg-sunken); }
.btn-ghost { background: transparent; color: var(--brand-civic); }
.btn-ghost:hover { background: var(--status-info-bg); }
.btn-danger { background: var(--status-alarm); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 8px; }
.btn img { width: 14px; height: 14px; }
</style></head>
<body><div class="card">
  <div class="label">Buttons</div>
  <div class="row">
    <button class="btn btn-primary"><img src="../assets/icons/plus.svg" style="filter: invert(8%) sepia(20%) saturate(700%);">新建设备</button>
    <button class="btn btn-secondary">取消 / Cancel</button>
    <button class="btn btn-ghost">View details →</button>
    <button class="btn btn-danger">关闭路灯</button>
  </div>
  <div class="row">
    <button class="btn btn-primary btn-sm">保存</button>
    <button class="btn btn-secondary btn-sm">导出 CSV</button>
    <button class="btn btn-secondary btn-sm" style="opacity: 0.4;">Disabled</button>
    <button class="btn btn-secondary btn-sm" style="box-shadow: 0 0 0 3px rgba(30,64,175,0.25);">Focused</button>
  </div>
</div></body></html>
