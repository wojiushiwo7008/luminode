<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Spacing · Radii</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">Corner radii</div>
  <div class="row" style="gap: 12px; align-items: flex-end;">
    <div class="col" style="align-items: center; gap: 4px;"><div style="width:48px;height:48px;background:var(--n-100);border:1px solid var(--border);border-radius:4px;"></div><span class="mono muted" style="font-size: 10px;">xs · 4</span></div>
    <div class="col" style="align-items: center; gap: 4px;"><div style="width:48px;height:48px;background:var(--n-100);border:1px solid var(--border);border-radius:6px;"></div><span class="mono muted" style="font-size: 10px;">sm · 6</span></div>
    <div class="col" style="align-items: center; gap: 4px;"><div style="width:48px;height:48px;background:var(--n-100);border:1px solid var(--border);border-radius:10px;"></div><span class="mono muted" style="font-size: 10px;">md · 10 · inputs</span></div>
    <div class="col" style="align-items: center; gap: 4px;"><div style="width:48px;height:48px;background:var(--n-100);border:1px solid var(--border);border-radius:14px;"></div><span class="mono muted" style="font-size: 10px;">lg · 14 · cards</span></div>
    <div class="col" style="align-items: center; gap: 4px;"><div style="width:48px;height:48px;background:var(--n-100);border:1px solid var(--border);border-radius:20px;"></div><span class="mono muted" style="font-size: 10px;">xl · 20 · sheets</span></div>
    <div class="col" style="align-items: center; gap: 4px;"><div style="width:80px;height:32px;background:var(--n-100);border:1px solid var(--border);border-radius:999px;"></div><span class="mono muted" style="font-size: 10px;">pill · chips</span></div>
  </div>
</div></body></html>
