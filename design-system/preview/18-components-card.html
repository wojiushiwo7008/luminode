<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Components · Card</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">Signature card · 14-px radius · hairline border · barely-there shadow</div>
  <div class="row" style="gap: 14px;">
    <div style="flex: 1; padding: 18px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 1px 3px rgba(11,18,32,0.06), 0 1px 2px rgba(11,18,32,0.04); display: flex; gap: 14px; align-items: center;">
      <div style="width: 44px; height: 44px; border-radius: 12px; background: var(--ramp-1); display: flex; align-items: center; justify-content: center; color: var(--brand-glow-deep);">
        <img src="../assets/icons/streetlight-on.svg" width="24" height="24">
      </div>
      <div class="col" style="gap: 2px;">
        <div style="font-size: 13px; font-weight: 600;">路灯 · Streetlight</div>
        <div class="muted" style="font-size: 11.5px;">A24 · 西街区 / W-block</div>
      </div>
      <div style="margin-left: auto; font-family: var(--font-mono); font-size: 18px; font-weight: 500; color: var(--brand-glow-deep);">60%</div>
    </div>
    <div style="flex: 1; padding: 18px; background: var(--bg-elevated); border: 1px solid var(--status-alarm); border-radius: 14px; box-shadow: 0 1px 3px rgba(11,18,32,0.06); display: flex; gap: 14px; align-items: center;">
      <div style="width: 44px; height: 44px; border-radius: 12px; background: var(--status-alarm-bg); display: flex; align-items: center; justify-content: center; color: var(--status-alarm);">
        <img src="../assets/icons/alert.svg" width="22" height="22">
      </div>
      <div class="col" style="gap: 2px;">
        <div style="font-size: 13px; font-weight: 600; color: var(--status-alarm);">故障 · Fault</div>
        <div class="muted" style="font-size: 11.5px;">B07 · 失联 12 分钟</div>
      </div>
    </div>
  </div>
</div></body></html>
