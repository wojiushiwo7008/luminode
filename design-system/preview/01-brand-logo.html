<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Brand · Logo</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="gap: 18px;">
  <div class="row" style="align-items: center; gap: 28px;">
    <img src="../assets/logo/luminode-lockup.svg" width="220" height="56" alt="Luminode lockup">
    <div class="col" style="gap: 4px;">
      <div style="font-size: 13px; font-weight: 600; color: var(--fg-1);">Luminode · 智慧路灯</div>
      <div class="muted" style="font-size: 11.5px; max-width: 280px;">Lumen + Node. Streetlight pole, signal halo, amber data-node. Bilingual lockup.</div>
    </div>
  </div>
  <div class="row" style="align-items: center; gap: 16px;">
    <div style="background: var(--brand-night); padding: 10px 18px; border-radius: 10px;">
      <img src="../assets/logo/luminode-lockup-dark.svg" width="180" height="44" alt="Luminode dark">
    </div>
    <img src="../assets/logo/luminode-mark.svg" width="48" height="48" alt="Mark">
    <div style="background: var(--brand-glow); padding: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: center; width: 48px; height: 48px;">
      <img src="../assets/logo/luminode-mark.svg" width="40" height="40" alt="Mark on glow" style="filter: brightness(0) invert(1);">
    </div>
  </div>
</div></body></html>
