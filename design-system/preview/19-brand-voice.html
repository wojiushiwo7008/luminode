<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Brand · Voice</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">Voice & tone · calm, civic, technical</div>
  <div class="col" style="gap: 10px; font-size: 13px;">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px 18px;">
      <div class="col" style="gap: 2px;"><span class="muted" style="font-size: 10.5px;">SAY</span><span style="color: var(--brand-glow-deep);">1,284 lamps online</span></div>
      <div class="col" style="gap: 2px;"><span class="muted" style="font-size: 10.5px;">NOT</span><span style="color: var(--status-alarm); text-decoration: line-through;">You have 1,284 active devices 🎉</span></div>
      <div class="col" style="gap: 2px;"><span class="muted" style="font-size: 10.5px;">SAY</span><span style="color: var(--brand-glow-deep);">设备失联，请检查网络</span></div>
      <div class="col" style="gap: 2px;"><span class="muted" style="font-size: 10.5px;">NOT</span><span style="color: var(--status-alarm); text-decoration: line-through;">哎呀，设备好像断网了 😅</span></div>
      <div class="col" style="gap: 2px;"><span class="muted" style="font-size: 10.5px;">SAY</span><span style="color: var(--brand-glow-deep);">本月节能 8.4 万度 · -14% YoY</span></div>
      <div class="col" style="gap: 2px;"><span class="muted" style="font-size: 10.5px;">NOT</span><span style="color: var(--status-alarm); text-decoration: line-through;">Wow! Huge energy savings this month 🚀</span></div>
    </div>
  </div>
</div></body></html>
