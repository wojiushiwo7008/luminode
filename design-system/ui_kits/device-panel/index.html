<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Luminode · Device Panel</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-canvas); }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background-image:
        linear-gradient(var(--n-100) 1px, transparent 1px),
        linear-gradient(90deg, var(--n-100) 1px, transparent 1px);
      background-size: 24px 24px;
      background-color: var(--bg-canvas);
    }
    .stage { display: flex; gap: 48px; padding: 48px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); letter-spacing: 0.08em; text-transform: uppercase; text-align: center; margin-top: 12px; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div class="stage">
    <div>
      <div id="phone"></div>
      <div class="label">Luminode · 设备控制 · iOS</div>
    </div>
  </div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel">
    const App = window.LuminodeDeviceApp;
    const root = ReactDOM.createRoot(document.getElementById('phone'));
    root.render(
      <window.IOSDevice width={390} height={820}>
        <App />
      </window.IOSDevice>
    );
  </script>
</body>
</html>
