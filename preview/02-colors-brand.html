<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Colors · Brand</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">Brand colors</div>
  <div class="row">
    <div class="swatch" style="background: #14B8A6;"><span class="swatch-name">Glow</span><span class="swatch-hex">#14B8A6</span></div>
    <div class="swatch" style="background: #5EEAD4;" ><span class="swatch-name dark-text" style="color: var(--fg-1);">Glow soft</span><span class="swatch-hex" style="color: var(--fg-2);">#5EEAD4</span></div>
    <div class="swatch" style="background: #0F766E;"><span class="swatch-name">Glow deep</span><span class="swatch-hex">#0F766E</span></div>
    <div class="swatch" style="background: #1E40AF;"><span class="swatch-name">Civic</span><span class="swatch-hex">#1E40AF</span></div>
    <div class="swatch" style="background: #F59E0B;"><span class="swatch-name">Amber</span><span class="swatch-hex">#F59E0B</span></div>
    <div class="swatch" style="background: #0B1220;"><span class="swatch-name">Night</span><span class="swatch-hex">#0B1220</span></div>
  </div>
  <div class="muted" style="font-size: 11px; line-height: 1.5;">
    Glow = lit lamp at dusk · Civic = data &amp; focus · Amber = legacy sodium-vapor accent · Night = dark surfaces.
  </div>
</div></body></html>
