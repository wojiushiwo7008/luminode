<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Spacing · Shadows</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label">Elevation · 5 steps + glow + focus</div>
  <div class="row" style="gap: 14px; padding: 12px 4px 18px;">
    <div class="col" style="align-items:center; gap: 6px;"><div style="width:60px;height:60px;background:#fff;border-radius:10px;box-shadow: 0 1px 2px rgba(11,18,32,0.04);"></div><span class="mono muted" style="font-size: 10px;">xs</span></div>
    <div class="col" style="align-items:center; gap: 6px;"><div style="width:60px;height:60px;background:#fff;border-radius:10px;box-shadow: 0 1px 3px rgba(11,18,32,0.06), 0 1px 2px rgba(11,18,32,0.04);"></div><span class="mono muted" style="font-size: 10px;">sm · cards</span></div>
    <div class="col" style="align-items:center; gap: 6px;"><div style="width:60px;height:60px;background:#fff;border-radius:10px;box-shadow: 0 4px 12px rgba(11,18,32,0.06), 0 2px 4px rgba(11,18,32,0.04);"></div><span class="mono muted" style="font-size: 10px;">md · menu</span></div>
    <div class="col" style="align-items:center; gap: 6px;"><div style="width:60px;height:60px;background:#fff;border-radius:10px;box-shadow: 0 12px 32px rgba(11,18,32,0.08), 0 4px 8px rgba(11,18,32,0.04);"></div><span class="mono muted" style="font-size: 10px;">lg · modal</span></div>
    <div class="col" style="align-items:center; gap: 6px;"><div style="width:60px;height:60px;background:#fff;border-radius:10px;box-shadow: 0 24px 64px rgba(11,18,32,0.12);"></div><span class="mono muted" style="font-size: 10px;">xl</span></div>
    <div class="col" style="align-items:center; gap: 6px;"><div style="width:60px;height:60px;background:#fff;border-radius:10px;box-shadow: 0 0 0 4px rgba(20,184,166,0.18);"></div><span class="mono muted" style="font-size: 10px;">glow · select</span></div>
    <div class="col" style="align-items:center; gap: 6px;"><div style="width:60px;height:60px;background:#fff;border-radius:10px;box-shadow: 0 0 0 3px rgba(30,64,175,0.25);"></div><span class="mono muted" style="font-size: 10px;">focus</span></div>
  </div>
</div></body></html>
